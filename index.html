<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Умный Дом - Схема системы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #05050a;
      --bg-secondary: #0d0d18;
      --bg-card: #14142a;
      --accent: #00d4ff;
      --accent-secondary: #7b2cbf;
      --text-primary: #ffffff;
      --text-secondary: #8892a0;
      --success: #00ff88;
      --glow: rgba(0, 212, 255, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    .bg-effects {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: orbFloat 20s ease-in-out infinite;
    }

    .bg-orb-1 {
      width: 500px;
      height: 500px;
      background: var(--accent);
      top: -200px;
      left: -100px;
      animation-delay: 0s;
    }

    .bg-orb-2 {
      width: 400px;
      height: 400px;
      background: var(--accent-secondary);
      bottom: -150px;
      right: -100px;
      animation-delay: -10s;
    }

    .bg-orb-3 {
      width: 300px;
      height: 300px;
      background: var(--success);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.15;
      animation: orbPulse 8s ease-in-out infinite;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(30px, -30px); }
      50% { transform: translate(-20px, 20px); }
      75% { transform: translate(-30px, -20px); }
    }

    @keyframes orbPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.15; }
      50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.25; }
    }

    /* Grid pattern */
    .grid-pattern {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 1;
    }

    /* Floating particles */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat 15s linear infinite;
    }

    @keyframes particleFloat {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-100vh) scale(1); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #fff, var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px var(--glow);
      animation: titleGlow 3s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }

    header .subtitle {
      color: var(--text-secondary);
      font-size: 1.15rem;
      margin-top: 12px;
    }

    .signature {
      display: inline-block;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(123, 44, 191, 0.2));
      padding: 12px 28px;
      border-radius: 30px;
      border: 1px solid rgba(0, 212, 255, 0.5);
      color: var(--accent);
      font-size: 0.95rem;
      font-weight: 500;
      margin-top: 22px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .schema-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .schema {
      position: relative;
      width: 520px;
      height: 520px;
    }

    .center-house {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 130px;
      height: 130px;
      cursor: pointer;
      z-index: 10;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .center-house:hover {
      transform: translate(-50%, -50%) scale(1.15);
    }

    .center-house:active {
      transform: translate(-50%, -50%) scale(0.95);
    }

    .center-house svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 30px var(--glow)) drop-shadow(0 0 60px rgba(0, 212, 255, 0.3));
    }

    .center-house.glow-pulse {
      animation: housePulse 0.5s ease-out;
    }

    @keyframes housePulse {
      0% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.3); filter: brightness(2); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    .device-node {
      position: absolute;
      width: 75px;
      height: 75px;
      background: linear-gradient(145deg, var(--bg-card), var(--bg-secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 2px solid transparent;
      z-index: 5;
    }

    .device-node:hover {
      transform: scale(1.25);
      border-color: var(--accent);
      box-shadow: 
        0 0 30px rgba(0, 212, 255, 0.5),
        0 0 60px rgba(0, 212, 255, 0.2),
        inset 0 0 20px rgba(0, 212, 255, 0.1);
    }

    .device-node:active {
      transform: scale(0.9);
    }

    .device-node svg {
      width: 34px;
      height: 34px;
      fill: var(--accent);
      transition: all 0.3s;
    }

    .device-node:hover svg {
      fill: #fff;
      filter: drop-shadow(0 0 8px var(--accent));
    }

    .device-node .status {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--success);
      border: 2px solid var(--bg-primary);
      box-shadow: 0 0 10px var(--success), 0 0 20px rgba(0, 255, 136, 0.3);
      animation: statusGlow 2s ease-in-out infinite;
    }

    .device-node .status.off {
      background: var(--text-secondary);
      box-shadow: none;
      animation: none;
    }

    @keyframes statusGlow {
      0%, 100% { box-shadow: 0 0 10px var(--success); }
      50% { box-shadow: 0 0 20px var(--success), 0 0 30px rgba(0, 255, 136, 0.5); }
    }

    .device-node .tooltip {
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      white-space: nowrap;
      opacity: 0;
      transition: all 0.3s;
      border: 1px solid var(--accent);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
    }

    .device-node:hover .tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(5px);
    }

    /* Connection circles */
    .connections {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .conn-circle {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 2px dashed rgba(0, 212, 255, 0.15);
      border-radius: 50%;
      animation: circleRotate 30s linear infinite;
    }

    .conn-circle-1 { width: 420px; height: 420px; }
    .conn-circle-2 { width: 300px; height: 300px; animation-direction: reverse; animation-duration: 20s; }

    @keyframes circleRotate {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .conn-line {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 180px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      transform-origin: top center;
      opacity: 0.3;
    }

    .conn-line::after {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      bottom: 0;
      left: -2px;
      box-shadow: 0 0 10px var(--accent);
      animation: dotMove 3s ease-in-out infinite;
    }

    @keyframes dotMove {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(170px); opacity: 0.3; }
    }

    .instruction {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 35px;
      padding: 18px 30px;
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
      border-radius: 20px;
      display: inline-block;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: linear-gradient(165deg, var(--bg-secondary), var(--bg-card));
      border-radius: 30px;
      max-width: 500px;
      width: 100%;
      padding: 42px;
      position: relative;
      border: 1px solid rgba(0, 212, 255, 0.4);
      box-shadow: 
        0 0 80px rgba(0, 212, 255, 0.2),
        0 20px 60px rgba(0, 0, 0, 0.5);
      animation: modalSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes modalSlide {
      from { opacity: 0; transform: scale(0.8) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      background: var(--bg-card);
      border: none;
      border-radius: 14px;
      color: var(--text-primary);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .modal-close:hover {
      background: var(--accent);
      color: var(--bg-primary);
      transform: rotate(90deg);
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 22px;
      margin-bottom: 30px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--bg-card);
    }

    .modal-icon {
      width: 75px;
      height: 75px;
      background: linear-gradient(145deg, var(--bg-card), var(--bg-secondary));
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--accent);
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.3);
    }

    .modal-icon svg {
      width: 40px;
      height: 40px;
      fill: var(--accent);
    }

    .modal-header h2 {
      font-size: 1.7rem;
      font-weight: 700;
    }

    .modal-body { margin-bottom: 28px; }

    .modal-section { margin-bottom: 24px; }

    .modal-section h3 {
      font-size: 0.8rem;
      color: var(--accent);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }

    .description {
      background: var(--bg-card);
      padding: 22px;
      border-radius: 16px;
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.75;
      border-left: 3px solid var(--accent);
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .info-item {
      background: var(--bg-card);
      padding: 18px;
      border-radius: 14px;
      border-left: 3px solid var(--accent);
      transition: all 0.3s;
    }

    .info-item:hover {
      border-left-color: var(--accent-secondary);
      transform: translateX(5px);
    }

    .info-item .label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .info-item .value {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      border: none;
      border-radius: 18px;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 30px rgba(0, 212, 255, 0.3);
    }

    .toggle-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 40px rgba(0, 212, 255, 0.5);
    }

    .toggle-btn.off {
      background: var(--bg-card);
      border: 2px solid var(--text-secondary);
      box-shadow: none;
    }

    .toggle-btn.off:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    @media (max-width: 600px) {
      .schema { width: 340px; height: 340px; }
      .center-house { width: 90px; height: 90px; }
      .device-node { width: 55px; height: 55px; }
      .device-node svg { width: 26px; height: 26px; }
      header h1 { font-size: 1.8rem; }
      .conn-circle-1 { width: 280px; height: 280px; }
      .conn-circle-2 { width: 200px; height: 200px; }
    }
  </style>
</head>
<body>
  <div class="bg-effects">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>
  <div class="grid-pattern"></div>

  <div class="container">
    <header>
      <h1>🏠 Умный Дом</h1>
      <p class="subtitle">Интерактивная схема системы</p>
      <div class="signature">👨‍🎓 Гульков Илья 9Г 2026</div>
    </header>

    <div class="schema-wrapper">
      <div class="schema">
        <!-- Rotating circles -->
        <div class="connections">
          <div class="conn-circle conn-circle-1"></div>
          <div class="conn-circle conn-circle-2"></div>
          <div class="conn-line" style="transform: translate(-50%, -50%) rotate(0deg);"></div>
          <div class="conn-line" style="transform: translate(-50%, -50%) rotate(72deg);"></div>
          <div class="conn-line" style="transform: translate(-50%, -50%) rotate(144deg);"></div>
          <div class="conn-line" style="transform: translate(-50%, -50%) rotate(216deg);"></div>
          <div class="conn-line" style="transform: translate(-50%, -50%) rotate(288deg);"></div>
        </div>

        <!-- Center House -->
        <div class="center-house" onclick="pulseHouse()">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="rgba(0, 212, 255, 0.2)" stroke="var(--accent)" stroke-width="1.5"/>
            <polyline points="9 22 9 12 15 12 15 22" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
            <circle cx="12" cy="8" r="2.5" fill="var(--accent)">
              <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
            </circle>
          </svg>
        </div>

        <!-- Device Nodes -->
        <div class="device-node" style="left: 50%; top: 15px; transform: translateX(-50%);" onclick="openDevice('wifi')">
          <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <div class="status"></div>
          <span class="tooltip">Wi-Fi</span>
        </div>

        <div class="device-node" style="right: 12px; top: 50%; transform: translateY(-50%);" onclick="openDevice('light')">
          <svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M12 2v1M21 12h1M3 12H2M18.4 5.6l.7-.7M5.6 5.6l-.7-.7" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3.5" fill="currentColor"/></svg>
          <div class="status"></div>
          <span class="tooltip">Свет</span>
        </div>

        <div class="device-node" style="left: 50%; bottom: 15px; transform: translateX(-50%);" onclick="openDevice('camera')">
          <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z" fill="currentColor"/><rect x="1" y="5" width="15" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <div class="status"></div>
          <span class="tooltip">Камера</span>
        </div>

        <div class="device-node" style="left: 12px; top: 50%; transform: translateY(-50%);" onclick="openDevice('lock')">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <div class="status"></div>
          <span class="tooltip">Замок</span>
        </div>

        <div class="device-node" style="right: 60px; top: 60px;" onclick="openDevice('thermostat')">
          <svg viewBox="0 0 24 24"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" fill="currentColor"/></svg>
          <div class="status"></div>
          <span class="tooltip">Климат</span>
        </div>

        <div class="device-node" style="left: 60px; bottom: 60px;" onclick="openDevice('speaker')">
          <svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="12" cy="14" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <div class="status off"></div>
          <span class="tooltip">Колонка</span>
        </div>
      </div>
    </div>

    <div style="text-align: center;">
      <div class="instruction">✨ Нажмите на центр или устройство для управления</div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div class="modal-header">
        <div class="modal-icon" id="modalIcon"></div>
        <h2 id="modalTitle">Устройство</h2>
      </div>
      <div class="modal-body">
        <div class="modal-section">
          <h3>Описание</h3>
          <div class="description" id="modalDesc"></div>
        </div>
        <div class="modal-section">
          <h3>Характеристики</h3>
          <div class="info-grid" id="modalInfo"></div>
        </div>
      </div>
      <button class="toggle-btn" id="modalToggle" onclick="toggleDevice()">Выключить</button>
    </div>
  </div>

  <script>
    // Audio context for sounds
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      if (type === 'click') {
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.15);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.15);
      } else if (type === 'open') {
        oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.2);
        oscillator.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.3);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.3);
      } else if (type === 'close') {
        oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.15);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.15);
      } else if (type === 'toggle') {
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(type === 'toggle-on' ? 440 : 220, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(type === 'toggle-on' ? 880 : 110, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
      }
    }

    const devices = {
      wifi: {
        name: 'Wi-Fi Роутер',

    let currentDevice = null;

    function openDevice(id) {
      playSound('click');
      playSound('open');
      currentDevice = devices[id];
      document.getElementById('modalIcon').innerHTML = currentDevice.icon;
      document.getElementById('modalTitle').textContent = currentDevice.name;
      document.getElementById('modalDesc').textContent = currentDevice.desc;
      document.getElementById('modalInfo').innerHTML = currentDevice.info.map(item => `
        <div class="info-item">
          <div class="label">${item.label}</div>
          <div class="value">${item.value}</div>
        </div>
      `).join('');
      const btn = document.getElementById('modalToggle');
      btn.textContent = currentDevice.on ? 'Выключить' : 'Включить';
      btn.className = currentDevice.on ? 'toggle-btn' : 'toggle-btn off';
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      playSound('close');
      document.getElementById('modal').classList.remove('active');
      currentDevice = null;
    }

    function toggleDevice() {
      if (currentDevice) {
        const wasOn = currentDevice.on;
        currentDevice.on = !currentDevice.on;
        playSound(wasOn ? 'close' : 'open');
        openDevice(currentDevice.id);
      }
    }

    function pulseHouse() {
      playSound('click');
      const house = document.querySelector('.center-house');
      house.classList.add('glow-pulse');
      setTimeout(() => house.classList.remove('glow-pulse'), 500);
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });
  </script>
