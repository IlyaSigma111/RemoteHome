<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Умный Дом - Схема системы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a12;
      --bg-secondary: #12121f;
      --bg-card: #1a1a2e;
      --accent: #00d4ff;
      --accent-secondary: #7b2cbf;
      --text-primary: #ffffff;
      --text-secondary: #8892a0;
      --success: #00ff88;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      background-image: 
        radial-gradient(ellipse at 50% 30%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(123, 44, 191, 0.06) 0%, transparent 50%);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header .subtitle {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-top: 10px;
    }

    .signature {
      display: inline-block;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(123, 44, 191, 0.15));
      padding: 10px 25px;
      border-radius: 25px;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.95rem;
      font-weight: 500;
      margin-top: 20px;
    }

    .schema-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .schema {
      position: relative;
      width: 500px;
      height: 500px;
    }

    .center-house {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 10;
    }

    .center-house:hover {
      transform: translate(-50%, -50%) scale(1.1);
    }

    .center-house svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 25px rgba(0, 212, 255, 0.5));
    }

    .device-node {
      position: absolute;
      width: 70px;
      height: 70px;
      background: linear-gradient(145deg, var(--bg-card), var(--bg-secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      z-index: 5;
    }

    .device-node:hover {
      transform: scale(1.2);
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.4), 0 0 60px rgba(0, 212, 255, 0.1);
    }

    .device-node svg {
      width: 32px;
      height: 32px;
      fill: var(--accent);
    }

    .device-node .status {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--success);
      border: 2px solid var(--bg-primary);
      box-shadow: 0 0 8px var(--success);
    }

    .device-node .status.off {
      background: var(--text-secondary);
      box-shadow: none;
    }

    .device-node .tooltip {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card);
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .device-node:hover .tooltip {
      opacity: 1;
    }

    .connection {
      position: absolute;
      background: transparent;
      z-index: 1;
    }

    .connection-line {
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 6, 6;
      fill: none;
      opacity: 0.3;
    }

    .instruction {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 30px;
      padding: 15px 25px;
      background: var(--bg-secondary);
      border-radius: 15px;
      display: inline-block;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(15px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(165deg, var(--bg-secondary), var(--bg-card));
      border-radius: 28px;
      max-width: 480px;
      width: 100%;
      padding: 40px;
      position: relative;
      border: 1px solid rgba(0, 212, 255, 0.3);
      box-shadow: 0 0 60px rgba(0, 212, 255, 0.15);
      animation: modalIn 0.35s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.85) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 38px;
      height: 38px;
      background: var(--bg-card);
      border: none;
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }

    .modal-close:hover {
      background: var(--accent);
      color: var(--bg-primary);
      transform: rotate(90deg);
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--bg-card);
    }

    .modal-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(145deg, var(--bg-card), var(--bg-secondary));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--accent);
    }

    .modal-icon svg {
      width: 38px;
      height: 38px;
      fill: var(--accent);
    }

    .modal-header h2 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .modal-body {
      margin-bottom: 25px;
    }

    .modal-section {
      margin-bottom: 22px;
    }

    .modal-section h3 {
      font-size: 0.8rem;
      color: var(--accent);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }

    .description {
      background: var(--bg-card);
      padding: 20px;
      border-radius: 14px;
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .info-item {
      background: var(--bg-card);
      padding: 16px;
      border-radius: 12px;
      border-left: 3px solid var(--accent);
    }

    .info-item .label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .info-item .value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .toggle-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 35px rgba(0, 212, 255, 0.4);
    }

    .toggle-btn.off {
      background: var(--bg-card);
      border: 2px solid var(--text-secondary);
    }

    .toggle-btn.off:hover {
      border-color: var(--accent);
      box-shadow: none;
    }

    @media (max-width: 600px) {
      .schema {
        width: 320px;
        height: 320px;
      }
      .center-house {
        width: 80px;
        height: 80px;
      }
      .device-node {
        width: 50px;
        height: 50px;
      }
      .device-node svg {
        width: 24px;
        height: 24px;
      }
      header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏠 Умный Дом</h1>
      <p class="subtitle">Интерактивная схема системы</p>
      <div class="signature">Гульков Илья 9Г 2026</div>
    </header>

    <div class="schema-wrapper">
      <div class="schema">
        <svg style="position: absolute; inset: 0; pointer-events: none;" viewBox="0 0 500 500">
          <circle cx="250" cy="250" r="160" class="connection-line"/>
          <circle cx="250" cy="250" r="100" class="connection-line" stroke-dasharray="4,4"/>
          <line x1="250" y1="250" x2="90" y2="250" class="connection-line"/>
          <line x1="250" y1="250" x2="250" y2="90" class="connection-line"/>
          <line x1="250" y1="250" x2="410" y2="250" class="connection-line"/>
          <line x1="250" y1="250" x2="250" y2="410" class="connection-line"/>
          <line x1="250" y1="250" x2="123" y2="123" class="connection-line"/>
          <line x1="250" y1="250" x2="377" y2="123" class="connection-line"/>
          <line x1="250" y1="250" x2="377" y2="377" class="connection-line"/>
          <line x1="250" y1="250" x2="123" y2="377" class="connection-line"/>
        </svg>

        <div class="center-house" onclick="pulseHouse()">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="rgba(0, 212, 255, 0.15)" stroke="var(--accent)" stroke-width="1.5"/>
            <polyline points="9 22 9 12 15 12 15 22" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
            <circle cx="12" cy="8" r="2" fill="var(--accent)"/>
          </svg>
        </div>

        <div class="device-node node-1" style="left: 50%; top: 18px; transform: translateX(-50%);" onclick="openDevice('wifi')">
          <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <div class="status"></div>
          <span class="tooltip">Wi-Fi</span>
        </div>

        <div class="device-node node-2" style="right: 18px; top: 50%; transform: translateY(-50%);" onclick="openDevice('light')">
          <svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M12 2v1M21 12h1M3 12H2M18.4 5.6l.7-.7M5.6 5.6l-.7-.7" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3.5" fill="currentColor"/></svg>
          <div class="status"></div>
          <span class="tooltip">Свет</span>
        </div>

        <div class="device-node node-3" style="left: 50%; bottom: 18px; transform: translateX(-50%);" onclick="openDevice('camera')">
          <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z" fill="currentColor"/><rect x="1" y="5" width="15" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <div class="status"></div>
          <span class="tooltip">Камера</span>
        </div>

        <div class="device-node node-4" style="left: 18px; top: 50%; transform: translateY(-50%);" onclick="openDevice('lock')">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <div class="status"></div>
          <span class="tooltip">Замок</span>
        </div>

        <div class="device-node node-5" style="right: 65px; top: 65px;" onclick="openDevice('thermostat')">
          <svg viewBox="0 0 24 24"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" fill="currentColor"/></svg>
          <div class="status"></div>
          <span class="tooltip">Климат</span>
        </div>

        <div class="device-node node-6" style="left: 65px; bottom: 65px;" onclick="openDevice('speaker')">
          <svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="12" cy="14" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
          <div class="status off"></div>
          <span class="tooltip">Колонка</span>
        </div>
      </div>
    </div>

    <div style="text-align: center;">
      <div class="instruction">👆 Нажмите на устройство для просмотра подробностей</div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div class="modal-header">
        <div class="modal-icon" id="modalIcon"></div>
        <h2 id="modalTitle">Устройство</h2>
      </div>
      <div class="modal-body">
        <div class="modal-section">
          <h3>Описание</h3>
          <div class="description" id="modalDesc"></div>
        </div>
        <div class="modal-section">
          <h3>Характеристики</h3>
          <div class="info-grid" id="modalInfo"></div>
        </div>
      </div>
      <button class="toggle-btn" id="modalToggle" onclick="toggleDevice()">Выключить</button>
    </div>
  </div>

  <script>
    const devices = {
      wifi: {
        name: 'Wi-Fi Роутер',
        icon: '<svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>',
        on: true,
        desc: 'Центральный беспроводной маршрутизатор, обеспечивающий связь всех умных устройств в доме. Он же хаб (шлюз) для интернета вещей.',
        info: [
          { label: 'Модель', value: 'ASUS RT-AX88U' },
          { label: 'Скорость', value: '6000 Мбит/с' },
          { label: 'Устройств', value: '12 подкл.' },
          { label: 'IP', value: '192.168.1.1' }
        ]
      },
      light: {
        name: 'Умное освещение',
        icon: '<svg viewBox="0 0 24 24"><path d="M9 18h6M10 22h4M12 2v1M21 12h1M3 12H2M18.4 5.6l.7-.7M5.6 5.6l-.7-.7" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3.5" fill="currentColor"/></svg>',
        on: true,
        desc: 'Светодиодные лампы с регулировкой яркости и цвета. Управляются со смартфона или голосом. Можно настроить сценарии освещения.',
        info: [
          { label: 'Лампы', value: '12 шт.' },
          { label: 'Яркость', value: '75%' },
          { label: 'Цвет', value: 'Тёплый белый' },
          { label: 'Мощность', value: '9 Вт/ламп.' }
        ]
      },
      camera: {
        name: 'Камера видеонаблюдения',
        icon: '<svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z" fill="currentColor"/><rect x="1" y="5" width="15" height="14" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>',
        on: true,
        desc: 'Комнатная камера с HD качеством и ночным видением. Пишет видео в облако. Датчик движения отправляет уведомления на телефон.',
        info: [
          { label: 'Разрешение', value: '1080p' },
          { label: 'Угол обзора', value: '130°' },
          { label: 'Ночной режим', value: 'Вкл.' },
          { label: 'Запись', value: 'Облако' }
        ]
      },
      lock: {
        name: 'Умный замок',
        icon: '<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>',
        on: true,
        desc: 'Электронный замок с открытием по отпечатку пальца, NFC или коду. Автоматически блокируется при выходе из дома.',
        info: [
          { label: 'Модель', value: 'Aqara U100' },
          { label: 'Способы', value: 'NFC, код' },
          { label: 'Автоблок', value: '30 сек' },
          { label: 'Батарея', value: '~12 мес.' }
        ]
      },
      thermostat: {
        name: 'Климат-контроль',
        icon: '<svg viewBox="0 0 24 24"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" fill="currentColor"/></svg>',
        on: true,
        desc: 'Умный термостат управляет отоплением и кондиционером. Поддерживает заданную температуру автоматически, экономя энергию.',
        info: [
          { label: 'Сейчас', value: '22°C' },
          { label: 'Цель', value: '21°C' },
          { label: 'Влажность', value: '45%' },
          { label: 'Режим', value: 'Авто' }
        ]
      },
      speaker: {
        name: 'Голосовая колонка',
        icon: '<svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="12" cy="14" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>',
        on: false,
        desc: 'Умная колонка с голосовым ассистентом. Управляет всеми устройствами голосом, включает музыку, отвечает на вопросы.',
        info: [
          { label: 'Модель', value: 'Яндекс.Станция' },
          { label: 'Ассистент', value: 'Алиса' },
          { label: 'Громкость', value: '50%' },
          { label: 'Музыка', value: 'Пауза' }
        ]
      }
    };

    let currentDevice = null;

    function openDevice(id) {
      currentDevice = devices[id];
      document.getElementById('modalIcon').innerHTML = currentDevice.icon;
      document.getElementById('modalTitle').textContent = currentDevice.name;
      document.getElementById('modalDesc').textContent = currentDevice.desc;
      document.getElementById('modalInfo').innerHTML = currentDevice.info.map(item => `
        <div class="info-item">
          <div class="label">${item.label}</div>
          <div class="value">${item.value}</div>
        </div>
      `).join('');
      const btn = document.getElementById('modalToggle');
      btn.textContent = currentDevice.on ? 'Выключить' : 'Включить';
      btn.className = currentDevice.on ? 'toggle-btn' : 'toggle-btn off';
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      currentDevice = null;
    }

    function toggleDevice() {
      if (currentDevice) {
        currentDevice.on = !currentDevice.on;
        openDevice(currentDevice.id);
      }
    }

    function pulseHouse() {
      const house = document.querySelector('.center-house');
      house.style.transition = 'none';
      house.style.transform = 'translate(-50%, -50%) scale(0.9)';
      setTimeout(() => {
        house.style.transition = 'all 0.3s';
        house.style.transform = 'translate(-50%, -50%) scale(1.1)';
      }, 100);
      setTimeout(() => {
        house.style.transform = 'translate(-50%, -50%) scale(1)';
      }, 400);
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });
  </script>
</body>
</html>
